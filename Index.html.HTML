<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <!-- Carga de librerías base: A-Frame y el motor MindAR para imágenes -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <!-- Configuración de la escena vinculando el archivo .mind compilado -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;"
             color-space="sRGB" renderer="colorManagement: true"
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <!-- Cámara de la experiencia AR con controles de entorno deshabilitados -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Anclaje asociado al índice 0 de nuestra imagen objetivo -->
      <a-entity mindar-image-target="targetIndex: 0">
        
        <!-- NOTA PARA ALUMNOS: Reemplazar el cubo inferior por su modelo final: -->
        <!-- <a-gltf-model src="./modelo.glb" position="0 0 0.1" scale="0.5 0.5 0.5"></a-gltf-model> -->
        
        <!-- Objeto 3D de prueba con animación de rotación continua -->
        <a-box position="0 0 0.1" rotation="0 0 0" scale="0.3 0.3 0.3"
               material="color: #9B59B6; opacity: 0.9;"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-box>
        
      </a-entity>

    </a-scene>
  </body>
</html>
